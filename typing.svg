<svg width="540" height="48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9997BC"/>
      <stop offset="100%" style="stop-color:#FEE9CE"/>
    </linearGradient>
  </defs>
  <rect width="540" height="48" fill="#28293D" rx="6"/>
  <rect x="0" y="0" width="540" height="48" fill="none" stroke="#55518460" stroke-width="1" rx="6"/>
  <!-- dots -->
  <circle cx="16" cy="14" r="4" fill="#555184" opacity="0.8"/>
  <circle cx="28" cy="14" r="4" fill="#9997BC" opacity="0.6"/>
  <circle cx="40" cy="14" r="4" fill="#B2A6BE" opacity="0.4"/>
  <line x1="52" y1="0" x2="52" y2="48" stroke="#55518440" stroke-width="1"/>
  <text x="65" y="31" font-family="'Courier New', monospace" font-size="13" fill="url(#tg)">
    <tspan>$ building data pipelines that actually work...</tspan>
    <animate attributeName="opacity" values="1;1;0;0;1" dur="8s" repeatCount="indefinite"/>
  </text>
  <text x="65" y="31" font-family="'Courier New', monospace" font-size="13" fill="url(#tg)" opacity="0">
    <tspan>$ connecting physical devices to the cloud...</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0" dur="8s" repeatCount="indefinite"/>
  </text>
  <rect x="508" y="16" width="7" height="14" fill="#9997BC" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
