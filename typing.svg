<svg width="500" height="45" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7a8d0"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  <rect width="500" height="45" fill="#0d1117" rx="6"/>
  <text x="15" y="28" font-family="'Courier New', monospace" font-size="15" fill="url(#tg)">
    <tspan>🌸 Building data pipelines that actually work...</tspan>
    <animate attributeName="opacity" values="1;1;0;0;1;1" dur="8s" repeatCount="indefinite"/>
  </text>
  <text x="15" y="28" font-family="'Courier New', monospace" font-size="15" fill="url(#tg)" opacity="0">
    <tspan>☁️ Connecting physical devices to cloud magic...</tspan>
    <animate attributeName="opacity" values="0;0;1;1;0;0" dur="8s" repeatCount="indefinite"/>
  </text>
  <!-- cursor blink -->
  <rect x="470" y="14" width="8" height="16" fill="#c084fc" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
