<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7a8d0"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Floating data particles -->
  <g opacity="0.4">
    <circle cx="50" cy="40" r="2" fill="#f7a8d0"><animate attributeName="cy" values="40;20;40" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="160" r="1.5" fill="#c084fc"><animate attributeName="cy" values="160;140;160" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="50" r="2" fill="#67e8f9"><animate attributeName="cy" values="50;30;50" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="150" r="1.5" fill="#f7a8d0"><animate attributeName="cy" values="150;130;150" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="80" r="1" fill="#a78bfa"><animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="120" r="1.5" fill="#c084fc"><animate attributeName="cy" values="120;100;120" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="30" r="1" fill="#67e8f9"><animate attributeName="cy" values="30;10;30" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="180" r="2" fill="#f7a8d0"><animate attributeName="cy" values="180;160;180" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="170" r="1" fill="#a78bfa"><animate attributeName="cy" values="170;150;170" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="80" r="1.5" fill="#67e8f9"><animate attributeName="cy" values="80;60;80" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff08" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Main name text -->
  <text x="450" y="85" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="url(#text-grad)" filter="url(#glow)">
    Naimot-Omodolapo-Yekini
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#e2c4f7" letter-spacing="3">
    Data Engineer · IoT · Cloud
    <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
  </text>

  <!-- Decorative line -->
  <line x1="250" y1="135" x2="650" y2="135" stroke="url(#text-grad)" stroke-width="0.8" opacity="0.6">
    <animate attributeName="x1" values="450;250" dur="1.5s" fill="freeze"/>
    <animate attributeName="x2" values="450;650" dur="1.5s" fill="freeze"/>
  </line>

  <!-- Bottom tagline -->
  <text x="450" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#9ca3af" font-style="italic">
    ✦ turning raw data into real-world impact ✦
    <animate attributeName="opacity" values="0;0.8" dur="2.5s" fill="freeze"/>
  </text>

  <!-- Corner accents -->
  <g stroke="#f7a8d050" stroke-width="1" fill="none">
    <polyline points="10,10 10,30 30,30"/>
    <polyline points="890,10 890,30 870,30"/>
    <polyline points="10,190 10,170 30,170"/>
    <polyline points="890,190 890,170 870,170"/>
  </g>
</svg>
