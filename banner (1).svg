<svg width="900" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="40%" style="stop-color:#1a1a3e"/>
      <stop offset="70%" style="stop-color:#2E3061"/>
      <stop offset="100%" style="stop-color:#28293D"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1f3d"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16172e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="river" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9997BC"/>
      <stop offset="50%" style="stop-color:#555184"/>
      <stop offset="100%" style="stop-color:#2E3061"/>
    </linearGradient>
    <linearGradient id="glow-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9997BC"/>
      <stop offset="40%" style="stop-color:#FEE9CE"/>
      <stop offset="100%" style="stop-color:#9997BC"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="30%" r="30%">
      <stop offset="0%" style="stop-color:#FEE9CE; stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FEE9CE; stop-opacity:0"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="900" height="280" fill="url(#sky)"/>

  <!-- Moon glow -->
  <ellipse cx="450" cy="60" rx="200" ry="100" fill="url(#moonGlow)"/>

  <!-- Moon -->
  <circle cx="450" cy="55" r="28" fill="#FEE9CE" opacity="0.12"/>
  <circle cx="450" cy="55" r="20" fill="#FEE9CE" opacity="0.15"/>
  <circle cx="450" cy="55" r="12" fill="#FEE9CE" opacity="0.2"/>

  <!-- Stars -->
  <g fill="#FEE9CE">
    <circle cx="80" cy="25" r="1" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="15" r="1.5" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="30" r="1" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="20" r="1.5" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="730" cy="12" r="1" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="35" r="1" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="55" cy="60" r="1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="55" r="1.5" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="18" r="1" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="530" cy="40" r="1" opacity="0.4"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Far hills (lightest) -->
  <path d="M0,180 Q100,130 200,155 Q300,130 400,145 Q500,125 600,145 Q700,128 800,148 Q850,138 900,150 L900,280 L0,280 Z" fill="#1a1b38" opacity="0.9"/>

  <!-- Mid hills -->
  <path d="M0,210 Q80,170 180,190 Q280,160 380,185 Q460,165 550,182 Q650,160 750,178 Q830,168 900,175 L900,280 L0,280 Z" fill="#13142a"/>

  <!-- River / path of light down the middle -->
  <path d="M420,280 Q435,220 443,180 Q448,155 450,130 Q452,155 457,180 Q465,220 480,280 Z" fill="url(#river)" opacity="0.25" filter="url(#blur2)"/>
  <path d="M435,280 Q444,230 447,190 Q449,160 450,140 Q451,160 453,190 Q456,230 465,280 Z" fill="#9997BC" opacity="0.12" filter="url(#blur2)"/>

  <!-- Foreground dark hills -->
  <path d="M0,240 Q60,205 140,225 Q220,205 320,228 Q400,210 500,230 Q580,212 680,232 Q760,215 860,235 Q880,228 900,232 L900,280 L0,280 Z" fill="#0d0d1a"/>

  <!-- TEXT AREA - semi transparent overlay for readability -->
  <rect x="0" y="82" width="900" height="100" fill="#00000030"/>

  <!-- Welcome line -->
  <text x="450" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#9997BC" letter-spacing="5" opacity="0.9">
    ✦  WELCOME TO MY GITHUB  ✦
    <animate attributeName="opacity" values="0;0.9" dur="1s" fill="freeze"/>
  </text>

  <!-- Main name -->
  <text x="450" y="148" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" fill="url(#glow-text)" filter="url(#textglow)" letter-spacing="1">
    Naimot-Omodolapo-Yekini
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Divider line under name -->
  <line x1="300" y1="162" x2="600" y2="162" stroke="#9997BC" stroke-width="0.8" opacity="0.5">
    <animate attributeName="x1" values="450;300" dur="1.2s" fill="freeze"/>
    <animate attributeName="x2" values="450;600" dur="1.2s" fill="freeze"/>
  </line>

  <!-- Subtitle -->
  <text x="450" y="182" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#B2A6BE" letter-spacing="5">
    DATA ENGINEER  ·  IOT  ·  CLOUD
    <animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
  </text>
</svg>
